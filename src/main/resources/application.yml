server:
  port: 8080
  tomcat:
    max-threads: 200               # максимум потоков для обработки запросов
    max-connections: 10000          # максимум одновременных соединений
    connection-timeout: 5000        # таймаут соединения в мс
    accept-count: 100               # размер очереди ожидающих соединений

spring:
  application:
    name: urlshortener
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shortener}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50          # максимальный пул соединений к БД
      minimum-idle: 10                # минимум простаивающих соединений
      connection-timeout: 30000       # таймаут получения соединения
      idle-timeout: 600000             # таймаут простоя (10 минут)
      max-lifetime: 1800000            # макс. время жизни соединения (30 минут)
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 20               # максимум соединений в пуле
          max-idle: 10                  # максимум простаивающих
          min-idle: 5                    # минимум простаивающих
          max-wait: 5000                  # таймаут ожидания соединения
        metrics:
          enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
    enable:
      jdbc: true
      hikaricp: true
      lettuce: true

# Параметры приложения
app:
  link-ttl-days: 7              # время жизни ссылки в днях
  extend-threshold-minutes: 60  # порог продления expiresAt в минутах