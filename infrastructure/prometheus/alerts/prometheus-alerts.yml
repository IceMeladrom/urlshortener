groups:
  - name: urlshortener-alerts
    rules:
      - alert: HighHttpErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / sum(rate(http_server_requests_seconds_count[5m])) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: High HTTP 5xx error rate (>1%)

      - alert: HighRedisErrors
        expr: rate(redis_errors_total[1m]) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Redis errors rate > 0.1/s

      - alert: HighCpuUsage
        expr: avg by (instance) (rate(process_cpu_seconds_total[5m])) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: High CPU usage